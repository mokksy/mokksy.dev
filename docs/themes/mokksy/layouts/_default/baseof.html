<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="site-body">

  {{ partial "nav.html" . }}

  <main id="main-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{ partial "footer.html" . }}

  {{- $js := resources.Get "js/theme.js" | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>

</body>
</html>
