<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author.name | default "Konstantin Pavlov" }}">

<!-- Open Graph -->
<meta property="og:title"       content="{{ .Title }} — {{ .Site.Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type"        content="website">
<meta property="og:url"         content="{{ .Permalink }}">

<!-- Title -->
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>

<!-- Theme flash prevention: runs before CSS to avoid flash of wrong theme -->
<script>
(function(){
  var stored=localStorage.getItem('mokksy-theme');
  var pref=stored||'auto';
  var resolved=(pref==='auto')?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):pref;
  document.documentElement.setAttribute('data-theme',resolved);
  document.documentElement.setAttribute('data-theme-pref',pref);
})();
</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap">

<!-- CSS bundle -->
{{- $base   := resources.Get "css/base.css" }}
{{- $layout := resources.Get "css/layout.css" }}
{{- $docs   := resources.Get "css/docs.css" }}
{{- $bundle := slice $base $layout $docs | resources.Concat "css/bundle.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $bundle.RelPermalink }}" integrity="{{ $bundle.Data.Integrity }}">

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicons/favicon-48x48.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicons/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#252526">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#8f3ee3">

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">
