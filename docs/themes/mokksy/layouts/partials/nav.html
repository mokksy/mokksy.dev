<nav class="site-nav" role="navigation" aria-label="Main navigation">

  {{- $navLogo := .Site.Params.logo.nav | default "/mokksy-mascot-round-64.png" -}}
  <a href="{{ "/" | relURL }}" class="nav-logo" aria-label="{{ .Site.Title }} home">
    <img src="{{ $navLogo | relURL }}"
         alt=""
         width="28" height="28">
    {{ .Site.Title | default "mokksy" }}
  </a>

  <ul class="nav-links">
    {{ range .Site.Menus.main }}
    {{- $ext := or .Params.external (strings.HasPrefix .URL "http") -}}
    <li>
      <a href="{{ .URL }}"
         {{ if $ext }}target="_blank" rel="noopener noreferrer"{{ end }}
         {{ if and (not $ext) ($.IsMenuCurrent "main" .) }}class="active" aria-current="page"{{ end }}>
        {{ .Name }}
      </a>
    </li>
    {{ end }}
  </ul>

  <div class="nav-actions">
    {{ with .Site.Params.github }}
    <a href="{{ . }}" class="btn btn-ghost" target="_blank" rel="noopener noreferrer"
       aria-label="GitHub repository">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
      GitHub
    </a>
    {{ end }}

    <button
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Toggle colour theme"
      title="Toggle colour theme">
      <!-- Moon: shown when pref=light -->
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <!-- Sun: shown when pref=dark -->
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Half-circle: shown when pref=auto -->
      <svg class="icon-auto" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
           viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/>
      </svg>
    </button>
  </div>

</nav>
